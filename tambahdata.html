<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Data Mahasiswa | Teknologi Informasi</title>
    <link rel="stylesheet" type="text/css" href="Assets/css/style.css">
</head>
<body>
    <h2 align="center">Tambah Data Mahasiswa</h2>
    <form action="mahasiswa.html" method="post" enctype="multipart/form-data">
        <table cellpadding="10px" cellspacing="5px" align="center">
            <tr>
                <td><label for="nama">Nama:</label></td>
                <td>:</td>
                <td><input type="text" id="nama" name="nama"></td>
            </tr>
            <tr>
                <td><label for="nim">NIM:</label></td>
                <td>:</td>
                <td><input type="text" id="nim" name="nim"></td>
            </tr>
            <tr>
                <td><label for="foto">Foto:</label></td>
                <td>:</td>
                <td><input type="file" id="foto" name="foto"></td>
            </tr>
            <tr>
                <td><label for="uts">Nilai UTS:</label></td>
                <td>:</td>
                <td><input type="number" id="uts" name="uts"></td>
            </tr>
            <tr>
                <td><label for="uas">Nilai UAS:</label></td>
                <td>:</td>
                <td><input type="number" id="uas" name="uas"></td>
            </tr>
            <tr>
                <td><label for="tugas">Nilai Tugas:</label></td>
                <td>:</td>
                <td><input type="number" id="tugas" name="tugas"></td>
            </tr>
        </table>
        <div align="center">
            <button type="submit" value="Submit">
                Submit
            </button>
        </div>
    </form>
    <br>
    <hr>
    <br>
    <form>
    <table cellpadding="10px" cellspacing="5px" align="center">
        <tr>
            <td><label for="nama">Nama:</label></td>
            <td>:</td>
            <td><input type="text" id="nama" name="nama"></td> 
        </tr>
        <tr>
            <td><label for="nim">NIM:</label></td>
            <td>:</td>
            <td><input type="number" id="nim" name="nim"></td>
        </tr>
        <tr>
            <td><label for="password">Password:</label></td>
            <td>:</td>
            <td><input type="password" id="password" name="password"></td>
        </tr>
        <tr>
            <td><label for="email">Email:</label></td>
            <td>:</td>
            <td><input type="email" id="email" name="email"></td>
        </tr>
        <tr>
            <td><label for="no_hp">No HP:</label></td>
            <td>:</td>
            <td><input type="tel" id="no_hp" name="no_hp"></td>
        </tr>
        <tr>
            <td><label for="website">Website pribadi:</label></td>
            <td>:</td>
            <td><input type="url" id="website" name="website"></td>
        </tr>
        <tr>
            <td><label for="tanggal_lahir">Tanggal Lahir:</label></td>
            <td>:</td>
            <td><input type="date" id="tanggal_lahir" name="tanggal_lahir"></td>
        </tr>
        <tr>
            <td><label for="warna_favorit">Warna favorit:</label></td>
            <td>:</td>
            <td><input type="color" id="warna_favorit" name="warna_favorit"></td>
        </tr>
        <tr>
            <td><label for="tingkat_kepuasan">Tingkat kepuasan:</label></td>
            <td>:</td>
            <td><input type="range" id="tingkat_kepuasan" name="tingkat_kepuasan" min="0" max="100"></td>
        </tr>
        <tr>
            <td><label for="jenis_kelamin">Jenis kelamin:</label></td>
            <td>:</td>
            <td><input type="radio" id="jenis_kelamin" name="jenis_kelamin" value="laki-laki"> Laki-laki
                <input type="radio" id="jenis_kelamin" name="jenis_kelamin" value="perempuan"> Perempuan</td>
        </tr>
        <tr>
            <td><label for="hobi">Hobi:</label></td>
            <td>:</td>
            <td><input type="checkbox" id="hobi" name="hobi" value="membaca"> Membaca
                <input type="checkbox" id="hobi" name="hobi" value="olahraga"> Olahraga
                <input type="checkbox" id="hobi" name="hobi" value="musik"> Musik</td>
        </tr>
        <tr>
            <td><label for="upload_foto">Upload foto:</label></td>
            <td>:</td>
            <td><input type="file" id="upload_foto" name="upload_foto" accept="image/*"></td>
        </tr>
        <tr>
            <td><label for="alamat">Alamat:</label></td>
            <td>:</td>
            <td><textarea id="alamat" name="alamat"></textarea></td>
        </tr>
            <tr>
                <td><label for="jurusan">Jurusan:</label></td>
                <td>:</td>
                <td>
                    <select name="jurusan" id="jurusan">
                        <option value="">Pilih jurusan</option>
                        <option value="teknik_informatika">Teknik Informatika</option>
                        <option value="sistem_informasi">Sistem Informasi</option>
                        <option value="teknik_komputer">Teknik Komputer</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td colspan="3" align="center">
                    <button type="submit" value="Submit">
                        Submit
                    </button>
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
